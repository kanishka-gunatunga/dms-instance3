<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
</head>
<body>
    <p>Completing sign-in...</p>
    <script src="/msal-redirect-bridge.min.js"></script>
    <script>
        // MSAL v5 popup/iframe flow: parse the auth response and send it
        // to the opener via BroadcastChannel, then close this window.
        if (window.msalRedirectBridge && window.msalRedirectBridge.broadcastResponseToMainFrame) {
            window.msalRedirectBridge.broadcastResponseToMainFrame().catch(function (err) {
                console.error("MSAL redirect bridge failed:", err);
            });
        } else {
            console.error("MSAL redirect bridge script failed to load.");
        }
    </script>
</body>
</html>
